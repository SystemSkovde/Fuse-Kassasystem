<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <link href="style.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <style>
        table { border-collapse: collapse; width: 100%; margin-bottom: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        select { width: 50px; }
        button { padding: 4px 8px; cursor: pointer; }
        #totals p { font-weight: bold; }
        .cart-icon-wrapper { display: inline-flex; align-items: center; gap: 5px; }
        .circle { background: red; color: white; border-radius: 50%; padding: 4px 8px; }
    </style>
</head>
<body>

<nav>
    <span class="material-symbols-outlined big">home</span>
    <div class="cart-icon-wrapper">
        <span class="circle" id="cart-count">0</span>
        <span class="material-symbols-outlined big">shopping_basket</span>
    </div>
    <span class="material-symbols-outlined big">person</span>
</nav>

<h1>Shopping Cart</h1>

<table id="cart"></table>
<div id="totals"></div>

<footer>
    <div class="back">
        <span class="material-symbols-outlined smal">arrow_back_ios</span>
        <a href="scannaAlt1.html">Back</a>
    </div>
</footer>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const cartData = localStorage.getItem("cart");
    if (!cartData) return;

    let cart = JSON.parse(cartData);
    const cartTable = document.getElementById("cart");
    const totalsDiv = document.getElementById("totals");

    function renderCart() {
        cartTable.innerHTML = "";
        totalsDiv.innerHTML = "";

        const items = Object.values(cart);
        if(items.length === 0){
            cartTable.innerHTML = "<tr><td>Varukorgen är tom</td></tr>";
            document.getElementById("cart-count").textContent = 0;
            return;
        }

        // --- Header ---
        const header = document.createElement("tr");
        Object.keys(items[0]).forEach(key => {
            if(key === "code") return;
            const th = document.createElement("th");
            th.textContent = key === "quantity" ? "Amount" : key.charAt(0).toUpperCase() + key.slice(1);
            header.appendChild(th);
        });
        const thDelete = document.createElement("th");
        thDelete.textContent = "Ta bort";
        header.appendChild(thDelete);
        cartTable.appendChild(header);

        // --- Rows ---
        items.forEach(item => {
            const tr = document.createElement("tr");
            Object.entries(item).forEach(([key, value]) => {
                if(key === "code") return;
                const td = document.createElement("td");

                if(key === "quantity") {
                    const select = document.createElement("select");
                    for(let i=1;i<=10;i++){
                        const option = document.createElement("option");
                        option.value = i;
                        option.textContent = i;
                        if(i===value) option.selected = true;
                        select.appendChild(option);
                    }
                    select.addEventListener("change",(e)=>{
                        item.quantity = parseInt(e.target.value);
                        localStorage.setItem("cart", JSON.stringify(cart));
                        renderCart();
                    });
                    td.appendChild(select);
                } else {
                    td.textContent = value;
                }
                tr.appendChild(td);
            });

            // Ta bort-knapp
            const tdDelete = document.createElement("td");
            const btn = document.createElement("button");
            btn.textContent = "Ta bort";
            btn.addEventListener("click",()=>{
                delete cart[item.code];
                localStorage.setItem("cart", JSON.stringify(cart));
                renderCart();
            });
            tdDelete.appendChild(btn);
            tr.appendChild(tdDelete);

            cartTable.appendChild(tr);
        });

        updateTotals();
        updateCartCount();
    }

    function updateCartCount(){
        const totalQty = Object.values(cart).reduce((sum, i) => sum + i.quantity, 0);
        document.getElementById("cart-count").textContent = totalQty;
    }

    function updateTotals(){
        totalsDiv.innerHTML = "";
        const totals = {};
        Object.values(cart).forEach(item=>{
            const priceNum = parseFloat(item.Price); // utan "kr"
            const qty = item.quantity;
            if(!totals[item.Account]) totals[item.Account] = 0;
            totals[item.Account] += priceNum * qty;
        });
        for(let account in totals){
            const p = document.createElement("p");
            p.textContent = `Total ${account}: ${totals[account]}kr`;
            totalsDiv.appendChild(p);
        }
    }

    renderCart();
});
</script>

</body>
</html>
