<!DOCTYPE html>
<html lang="sv">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Shopping Cart</title>

        <link href="style.css" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

        <style>
            select { 
                width: 50px; 
            }
        
            button{ 
                display: block;
                width: 80%;
                margin: 10px auto;
                padding: 12px;
                border: 2px solid #333;
                border-radius: 8px;
                background: white;
                font-size: 16px;
                cursor: pointer;
                transition: 0.2s;
            }
            table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

table th,
table td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

table th {
    background-color: #f5f5f5;
}

table select {
    padding: 5px;
}

.remove-btn {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 5px;
}

.cart-total {
    margin-top: 15px;
    font-size: 30px;
    text-align: center; /* centrerad total */
}

.pay-button-wrapper {
    margin-top: 10px;
    text-align: center; /* centrerad PAY-knapp */
}

.pay-btn {
    background-color: #27ae60;
    color: white;
    border: none;
    padding: 15px 100px;
    font-size: 25px;
    cursor: pointer;
    border-radius: 5px;
}

.pay-btn:hover {
    background-color: #219150;
}

/* Back-knapp */
.back {
    display: inline-flex;      
    align-items: center;
    padding: 8px 10px;
    border: 2px solid #000000; 
    border-radius: 6px;
    background-color: #ffffff; 
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 20px; 
    text-decoration: none;
}

.top-nav {
    display: flex;
    justify-content: space-between;  /* symbolerna till höger */
    align-items: center;
    gap: 20px;                  /* avstånd mellan symboler */
    padding: 10px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.top-nav .material-symbols-outlined {
    font-size: 28px;
    cursor: pointer;
}

.nav-right {
    display: flex;
    gap: 20px;
    align-items: center;
}

.cart-icon {
    position: relative;
    text-decoration: none;
    color: inherit;
}

.cart-icon .circle {
    position: absolute;
    top: -8px;
    right: -8px;
    background-color: red;
    color: white;
    border-radius: 50%;
    font-size: 14px;
    width: 18px;
    height: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
}
            
        </style>   
    </head>
<body>
    
   <nav class="top-nav">
    <a href="Hem.html">
        <span class="material-symbols-outlined big">home</span>
    </a>
    <div class="nav-right">
        <a href="cartAlt1.html" class="cart-icon">
        <span class="circle" id="cart-count">0</span>
        <span class="material-symbols-outlined big">shopping_basket</span>
    </a>
    <a href="Minsida.html">
        <span class="material-symbols-outlined big">person</span>
    </a>
    </div>

</nav>
    
    <h1>Shopping Cart</h1>
    
    <table id="cart"></table>
    
    <div id="totals"></div>
    
    <button onclick="payCart()">Pay</button>
    
    <footer>
        <div class="back">
            <span class="material-symbols-outlined smal">arrow_back_ios</span>
            <a href="scannaAlt1.html">Back</a>
        </div>
    </footer>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const cartData = localStorage.getItem("cart");

            if (!cartData) return;
            
            let cart = JSON.parse(cartData);
            
            const cartTable = document.getElementById("cart");
            const totalsDiv = document.getElementById("totals");
            
            function renderCart() {
                cartTable.innerHTML = "";
                totalsDiv.innerHTML = "";

                const items = Object.values(cart);

                if(items.length === 0){
                    cartTable.innerHTML = "<tr><td>The cart is empty</td></tr>";
                    document.getElementById("cart-count").textContent = 0;
                    return;
                }
                
                const header = document.createElement("tr");
                Object.keys(items[0]).forEach(key => {

                if(key === "code") return;
                
                const th = document.createElement("th");
                th.textContent = key === "quantity" ? "Amount" : key.charAt(0).toUpperCase() + key.slice(1);
                header.appendChild(th);
                window.payCart = function() {
    if (Object.keys(cart).length === 0) {
        alert("Your cart is empty!");
        return;
    }

    const total = Object.values(cart).reduce((sum, item) => {
        return sum + (parseFloat(item.price) || 0) * (item.quantity || 0);
    }, 0);

    alert(`Payment complete! Total: ${total.toFixed(2)} kr`);
    
    // Tömmer varukorgen
    cart = {};
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
    updateCartCount();
}
            });

        const thDelete = document.createElement("th");
        thDelete.textContent = "";
        header.appendChild(thDelete);
        cartTable.appendChild(header);

        // --- Rows ---
        items.forEach(item => {
            const tr = document.createElement("tr");
            Object.entries(item).forEach(([key, value]) => {
                if(key === "code") return;
                const td = document.createElement("td");

                if(key === "quantity") {
                    const select = document.createElement("select");
                    for(let i=1;i<=10;i++){
                        const option = document.createElement("option");
                        option.value = i;
                        option.textContent = i;
                        if(i===value) option.selected = true;
                        select.appendChild(option);
                    }
                    select.addEventListener("change",(e)=>{
                        item.quantity = parseInt(e.target.value);
                        localStorage.setItem("cart", JSON.stringify(cart));
                        renderCart();
                    });
                    td.appendChild(select);
                } else {
                    td.textContent = value;
                }
                tr.appendChild(td);
            });

            // Ta bort-knapp
            const tdDelete = document.createElement("td");
            const icon = document.createElement("span");
icon.classList.add("material-symbols-outlined");
icon.textContent = "close";
icon.style.color = "red";
icon.style.cursor = "pointer";

icon.addEventListener("click", () => {
    delete cart[item.code];
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
});

tdDelete.appendChild(icon);

            tr.appendChild(tdDelete);

            cartTable.appendChild(tr);
        });

        updateTotals();
        updateCartCount();
    }

    function updateCartCount(){
        const totalQty = Object.values(cart).reduce((sum, i) => sum + i.quantity, 0);
        document.getElementById("cart-count").textContent = totalQty;
    }

    function updateTotals(){
        totalsDiv.innerHTML = "";
        const totals = {};
Object.values(cart).forEach(item=>{
    const priceNum = parseFloat(item.price); // FIX
    const qty = item.quantity;

    if(!totals[item.account]) totals[item.account] = 0; // FIX
    totals[item.account] += priceNum * qty;
});

        for(let account in totals){
            const p = document.createElement("p");
            p.textContent = `Total ${account}: ${totals[account]}kr`;
            totalsDiv.appendChild(p);
        }
    }

    renderCart();
});
</script>

</body>
</html>
