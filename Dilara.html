<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Streckkod Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
#scanner {
  width: 400px;
  height: 300px;
}
</style>
</head>

<body>

<h2>Scanna streckkod</h2>

<div id="scanner"></div>

<p>Resultat: <span id="result"></span></p>

<script>
Quagga.init({
  inputStream: {
    type: "LiveStream",
    target: document.querySelector('#scanner'),
    constraints: {
      facingMode: "environment"
    }
  },
  decoder: {
    readers: [
      "code_128_reader",
      "ean_reader",
      "ean_8_reader",
      "upc_reader"
    ]
  }
}, function(err) {
  if (err) {
    console.log(err);
    return;
  }
  Quagga.start();
});

Quagga.onDetected(function(data) {
  document.getElementById("result").textContent = data.codeResult.code;
});
</script>

</body>
</html>
