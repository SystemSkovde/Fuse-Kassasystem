<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Streckkod Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
}

#scanner{
  width:400px;
  margin:auto;
}

#result{
  font-size:24px;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>Scanna streckkod</h2>

<div id="scanner"></div>

<div id="result">Väntar på scanning...</div>

<script>

let lastCode = null;
let sameCount = 0;
const requiredMatches = 3; // antal gånger samma kod måste hittas

Quagga.init({
  inputStream: {
    type: "LiveStream",
    target: document.querySelector('#scanner'),
    constraints: {
      facingMode: "environment"
    }
  },
  decoder: {
    readers: [
      "ean_reader",
      "ean_8_reader",
      "code_128_reader",
      "upc_reader"
    ]
  }
}, function(err) {
  if (err) {
    console.log(err);
    return;
  }
  Quagga.start();
});

Quagga.onDetected(function(data) {

  let code = data.codeResult.code;

  if(code === lastCode){
      sameCount++;
  } else {
      sameCount = 0;
      lastCode = code;
  }

  if(sameCount >= requiredMatches){

      document.getElementById("result").innerHTML =
      "Scannad kod: <b>" + code + "</b>";

      Quagga.stop();
      document.getElementById("scanner").innerHTML = "";
  }

});

</script>

</body>
</html>
