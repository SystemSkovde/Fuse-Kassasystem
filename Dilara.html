<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Streckkod Scanner</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>
body{
  font-family: Arial;
  text-align:center;
}

#scanner{
  width:400px;
  margin:auto;
}

#result{
  font-size:24px;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>Scanna streckkod</h2>

<div id="scanner"></div>

<div id="result">Väntar på scanning...</div>

<script>

docReady(function () {

    const resultContainer = document.getElementById("qr-reader-results");

    let lastResult = null;
    let lastScanTime = 0;

    // ===== MATERIAL DATABAS =====
    const materials = {
        "123456789": {
            name: "Trä",
            type: "Byggmaterial",
            location: "Lager A"
        },
        "987654321": {
            name: "Stål",
            type: "Metall",
            location: "Lager B"
        },
        "555666777": {
            name: "Plast",
            type: "Polymer",
            location: "Lager C"
        }
    };

    // ===== QR / BARCODE SCANNER =====
    const html5QrcodeScanner = new Html5QrcodeScanner(
        "qr-reader",
        {
            fps: 10,
            qrbox: 250,
            formatsToSupport: [
                Html5QrcodeSupportedFormats.EAN_13,
                Html5QrcodeSupportedFormats.EAN_8,
                Html5QrcodeSupportedFormats.CODE_128,
                Html5QrcodeSupportedFormats.UPC_A,
                Html5QrcodeSupportedFormats.UPC_E
            ]
        }
    );

    function onScanSuccess(decodedText, decodedResult) {

        const now = Date.now();

        // ignorera samma kod inom 2 sekunder
        if (decodedText === lastResult && now - lastScanTime < 2000) {
            return;
        }

        lastResult = decodedText;
        lastScanTime = now;

        console.log("Scan result:", decodedText);

        // Kontrollera om material finns
        if (materials[decodedText]) {

            const material = materials[decodedText];

            resultContainer.innerHTML = `
                <h3>Material hittat</h3>
                <p><b>Barcode:</b> ${decodedText}</p>
                <p><b>Namn:</b> ${material.name}</p>
                <p><b>Typ:</b> ${material.type}</p>
                <p><b>Plats:</b> ${material.location}</p>
            `;

        } else {

            resultContainer.innerHTML = `
                <h3>Okänd kod</h3>
                <p><b>Barcode:</b> ${decodedText}</p>
            `;

        }
    }

    html5QrcodeScanner.render(onScanSuccess);

});

</script>

</body>
</html>
