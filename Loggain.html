<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fuse Login</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#e9eaee;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.phone{
    width:320px;
    background:#f7f7f7;
    border-radius:30px;
    padding:40px 25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:40px;
}

label{
    font-size:14px;
    color:#555;
}

input{
    width:100%;
    padding:12px;
    margin-top:6px;
    margin-bottom:20px;
    border:2px solid #333;
    border-radius:6px;
    font-size:14px;
}

.login-btn{
    width:100%;
    padding:14px;
    background:#1d1d1f;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

.forgot{
    width:100%;
    margin-top:15px;
    padding:10px;
    background:white;
    border:1px solid #333;
    border-radius:6px;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="phone">

<h1>Fuse</h1>

<label>CID</label>
<input type="text" placeholder="Text field in empty state">

<label>Password</label>
<input type="password" placeholder="Text field in empty state">

<button class="login-btn">Log in</button>

<button class="forgot">Forgot password?</button>

</div>

</body>
</html>
