<!DOCTYPE html>
<html lang="sv">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<meta charset="UTF-8">
<title>Shopping Cart</title>
<link rel="stylesheet" href="style.css">

<style>
.big {
    font-size: 40px !important;  /* !important tvingar storleken */
}

.cart-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

.cart-table th,
.cart-table td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

.cart-table th {
    background-color: #f5f5f5;
}

.cart-table select {
    padding: 5px;
}

.remove-btn {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 5px;
}

.cart-total {
    margin-top: 15px;
    font-size: 30px;
    text-align: center; /* centrerad total */
}

.pay-button-wrapper {
    margin-top: 10px;
    text-align: center; /* centrerad PAY-knapp */
}

.pay-btn {
    background-color: #27ae60;
    color: white;
    border: none;
    padding: 15px 100px;
    font-size: 25px;
    cursor: pointer;
    border-radius: 5px;
}

.pay-btn:hover {
    background-color: #219150;
}

/* Back-knapp */
.back {
    display: inline-flex;      
    align-items: center;
    padding: 8px 10px;
    border: 2px solid #000000; 
    border-radius: 6px;
    background-color: #ffffff; 
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 20px; 
    text-decoration: none;
}

.top-nav {
    display: flex;
    justify-content: space-between;  /* symbolerna till höger */
    align-items: center;
    gap: 20px;                  /* avstånd mellan symboler */
    padding: 10px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
}

.top-nav .material-symbols-outlined {
    font-size: 28px;
    cursor: pointer;
}

.nav-right {
    display: flex;
    gap: 20px;
    align-items: center;
}

.cart-icon {
    position: relative;
    text-decoration: none;
    color: inherit;
}

.cart-icon .circle {
    position: absolute;
    top: -8px;
    right: -8px;
    background-color: red;
    color: white;
    border-radius: 50%;
    font-size: 14px;
    width: 18px;
    height: 18px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.delete-icon {
    color: red;
    cursor: pointer;
    font-size: 28px;
}

</style>
</head>

<body>
<nav class="top-nav">
    <a href="hem2.html">
        <span class="material-symbols-outlined big">home</span>
    </a>

    <div class="nav-right">
        <a href="cartAlt2.html" class="cart-icon">
            <span class="circle" id="cart-count">0</span>
            <span class="material-symbols-outlined big">shopping_basket</span>
        </a>
            <a href="Minsida.html">
            <span class="material-symbols-outlined big">person</span>
        </a>
    </div>
</nav>

<h1>Shopping Cart</h1>

<!-- Varukorg -->
<div id="cart"></div>

<!-- Script -->
<script src="cartAlt2script.js"></script>

<!-- Back-knappen -->
<div class="back">
    <span class="material-symbols-outlined smal">arrow_back_ios</span>
    <a href="scannaAlt2.html">Back</a>
</div>

</body>
</html>
