<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>
<link rel="stylesheet" href="style.css">

<style>
.cart-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

.cart-table th,
.cart-table td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

.cart-table th {
    background-color: #f5f5f5;
}

.cart-table select {
    padding: 5px;
}

.cart-table button {
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}

.cart-total {
    margin-top: 15px;
    font-size: 20px;
    text-align: right;
}

.pay-button-wrapper {
    margin-top: 10px;
    text-align: right;
}

.pay-btn {
    background-color: #27ae60;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 5px;
}

.pay-btn:hover {
    background-color: #219150;
}

.remove-btn {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 4px;
}
</style>
</head>

<body>

<h1>Shopping Cart</h1>

<div id="cart"></div>

<a href="scannaAlt2.html">← Back</a>

<script src="cartAlt2script.js"></script>

</body>
</html>
