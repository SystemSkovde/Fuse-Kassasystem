<!DOCTYPE html>
<html lang="sv">
<head>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<meta charset="UTF-8">
<title>Shopping Cart</title>
<link rel="stylesheet" href="style.css">

<style>
.cart-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

.cart-table th,
.cart-table td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

.cart-table th {
    background-color: #f5f5f5;
}

.cart-table select {
    padding: 5px;
}

.remove-btn {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 5px;
}

.cart-total {
    margin-top: 15px;
    font-size: 30px;
    text-align: center; /* centrerad total */
}

.pay-button-wrapper {
    margin-top: 10px;
    text-align: center; /* centrerad PAY-knapp */
}

.pay-btn {
    background-color: #27ae60;
    color: white;
    border: none;
    padding: 15px 100px;
    font-size: 25px;
    cursor: pointer;
    border-radius: 5px;
}

.pay-btn:hover {
    background-color: #219150;
}

/* Back-knapp */
.back {
    display: inline-flex;      
    align-items: center;
    padding: 8px 10px;
    border: 2px solid #000000; 
    border-radius: 6px;
    background-color: #ffffff; 
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 20px; 
    text-decoration: none;
}
</style>
</head>

<body>

<!-- Back-knappen -->
<div class="back">
    <span class="material-symbols-outlined smal">arrow_back_ios</span>
    <a href="scannaAlt2.html">Back</a>
</div>

<h1>Shopping Cart</h1>

<!-- Varukorg -->
<div id="cart"></div>

<!-- Script -->
<script src="cartAlt2script.js"></script>

</body>
</html>
