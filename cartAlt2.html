<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Shopping Cart</title>
<link rel="stylesheet" href="style.css">

<style>
.cart-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 20px;
}

.cart-table th,
.cart-table td {
    border: 1px solid #ccc;
    padding: 10px;
    text-align: center;
}

.cart-table th {
    background-color: #f5f5f5;
}

.cart-table select {
    padding: 5px;
}

.cart-table button {
    background: red;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
}

.cart-total {
    margin-top: 15px;
    font-size: 30px;
    text-align: right;
}

.pay-button-wrapper {
    margin-top: 10px;
    text-align: center;
}

.pay-btn {
    background-color: #27ae60;
    color: white;
    border: none;
    padding: 15px 100px;
    font-size: 25px;
    cursor: pointer;
    border-radius: 5px;
}

.pay-btn:hover {
    background-color: #219150;
}

.remove-btn {
    background: #e74c3c;
    color: white;
    border: none;
    padding: 5px 10px;
    cursor: pointer;
    border-radius: 5px;
}

.back-button {
    display: inline-flex;      /* ikon + text på samma rad */
    align-items: center;
    padding: 8px 15px;
    border: 2px solid #2196F3; /* blå ram */
    border-radius: 6px;
    background-color: #eaf4ff; /* ljus bakgrund */
    text-decoration: none;
    cursor: pointer;
    font-weight: bold;
    margin-bottom: 20px;       /* lite avstånd från tabellen */
    transition: background-color 0.2s, border-color 0.2s;
}

.back-button:hover {
    background-color: #d0e7ff;
    border-color: #1976d2;
}

.back-button a {
    text-decoration: none;
    color: #1976d2;
    margin-left: 5px; /* lite space mellan ikon och text */
}
</style>
</head>

<body>
<span class="material-symbols-outlined">
arrow_back_ios
</span>
<h1>Shopping Cart</h1>

<div id="cart"></div>

<div class="back">
    <span class="material-symbols-outlined smal">
        arrow_back_ios
    </span>
    <a href="scannaAlt2.html">Back</a>

<script src="cartAlt2script.js"></script>

</body>
</html>
