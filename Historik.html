<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
  
  <title>Order History</title>
  <style>
    .big {
    font-size: 40px !important;  /* !important tvingar storleken */
}

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      padding: 30px 15px;
    }

    .content {
      width: 100%;
      max-width: 800px;
      background: #fff;
      border-radius: 16px;
      padding: 25px 20px 35px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
    }

    .top-icons {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      font-size: 38px;
    }

    .top-icons span {
      cursor: pointer;
      user-select: none;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      font-weight: 700;
      margin-bottom: 45px;
    }

    .history-section {
      margin-bottom: 55px;
    }

    .history-date {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      background: white;
    }

    th,
    td {
      border: 1px solid #d9d9d9;
      text-align: center;
      padding: 16px 10px;
      font-size: 18px;
    }

    th {
      font-weight: 700;
      background: #fafafa;
    }

    .bottom-buttons {
      margin-top: 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }

    .btn {
      min-width: 120px;
      padding: 12px 18px;
      font-size: 18px;
      border: 2px solid #999;
      border-radius: 12px;
      background: #f8f8f8;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: #eaeaea;
    }

    @media (max-width: 420px) {
      h1 {
        font-size: 34px;
      }

      .history-date {
        font-size: 24px;
      }

      th, td {
        font-size: 16px;
        padding: 14px 8px;
      }

      .btn {
        font-size: 16px;
        min-width: 110px;
      }
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="top-icons">
      <span class="material-symbols-outlined big">home </span>
      <span title="Meddelanden">✉</span>
    </div>

    <h1>Order history</h1>

    <div class="history-section">
      <div class="history-date">[21-02-2026]</div>
      <table>
        <thead>
          <tr>
            <th>Category</th>
            <th>Price</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Cell A</td>
            <td>Cell B</td>
            <td>1</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="history-section">
      <div class="history-date">[20-02-2026]</div>
      <table>
        <thead>
          <tr>
            <th>Category</th>
            <th>Price</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Cell A</td>
            <td>Cell B</td>
            <td>1</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="bottom-buttons">
      <button class="btn" onclick="history.back()">&lt; Back</button>    </div>
  </div>
</body>
</html>
