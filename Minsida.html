  <style>

    .container {

    }

      padding: 12px;

      border-radius: 8px;
      background: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background-color: #e6e6e6;
    }

    .big {
    font-size: 40px !important;  /* !important tvingar storleken */
}

/* Back-knapp */
