<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">

    .top-bar {

    .btn {

      margin: 10px auto;

      border: 2px solid #333;
      border-radius: 8px;
      background: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background-color: #e6e6e6;
    }
